<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Owner Verification</title>
<style>
body{
    font-family:"Segoe UI";
    background: #d4f4f8;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.box{
    background:white;
    padding:40px;
    border-radius:12px;
    width:400px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}
input{
    width:100%;
    padding:10px;
    margin-top:15px;
    border-radius:8px;
    border:1px solid #ccc;
}
button{
    margin-top:20px;
    padding:10px 20px;
    border:none;
    border-radius:8px;
    background:#10b981;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

/* ================= FOOTER ================= */
.footer{
    position:fixed;

    bottom:0;
    left:0;

    width:100%;
    height:60px;

    background:linear-gradient(90deg,#111827,#1f2937,#0f766e);

    color:white;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:14px;

    z-index:1000;
}
</style>
</head>
<body>

<div class="box">
<h2>👑 Owner Verification</h2>
<p>OTP will be sent to registered owner email</p>

<button onclick="sendOTP()">Send OTP</button>
<input id="otpInput" placeholder="Enter 9 digit OTP">
<button onclick="verifyOTP()">Verify OTP</button>
</div>

<script>
function sendOTP(){
    fetch("/send-owner-otp")
    .then(res => res.json())
    .then(data => {
        if(data.success){
            // show alert popup
            alert("✅ OTP sent to owner email. Please check your inbox.");
        } else {
            alert("❌ Failed to send OTP. " + (data.error || ""));
        }
    })
    .catch(err => {
        alert("❌ Error sending OTP: " + err);
    });
}

function verifyOTP(){
    const otp = document.getElementById("otpInput").value;
    fetch("/verify-owner-otp", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({otp: otp})
    })
    .then(res => res.json())
    .then(data => {
        if(data.success){
            alert("✅ OTP verified successfully! You are authorized.");
            window.location.href = "/owner-dashboard";
        } else {
            alert("❌ Invalid OTP. Try again.");
        }
    })
    .catch(err => {
        alert("❌ Error verifying OTP: " + err);
    });
}
</script>
<footer class="footer">
    © 2026 Product Dashboard | All Rights Reserved
</footer>
</body>
</html>
