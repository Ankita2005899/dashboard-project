<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sidebar Buttons</title>

    <style>
        /* ================= RESET ================= */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            

            font-family: "Segoe UI", sans-serif;
        }

        /* ================= BODY ================= */
        body {
            background: linear-gradient(135deg, #072a4d, #08293f, #f0fdfa);
            min-height: 100vh;
        }

        /* ================= SIDEBAR ================= */
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 260px;
            height: 100vh;
            background: linear-gradient(180deg, #a8bcee, #bcc2c3, #81f5e8);
            display: flex;
            flex-direction: column;
            padding: 20px;
            gap: 20px;
             padding: 20px 20px 20px 10px; /* top, right, bottom, left */
            box-shadow: 4px 0 20px rgba(0, 0, 0, 0.1);
        }

        /* ================= SIDEBAR BUTTON ================= */
        .sidebar button {
            padding: 12px 14px;
            margin-bottom: -8px;
            border-radius: 10px;
            margin-left: 0; /* ensure buttons are flush with sidebar */
            border: 2px solid #cbd5e1;
            background: rgba(255, 255, 255, 0.9);
            color: #1e293b;
            text-align: left;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;

             width: 100%; /* optional: makes buttons full width */
    text-align: left; /* keep text aligned left */
    padding-left: 14px; /* internal padding inside button */
        }

        .sidebar button:hover {
            background: linear-gradient(135deg, #f97316, #f59e0b);
            color: white;
            border-color: #f97316;
            transform: translateX(6px);
        }

        .sidebar button.active {
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: white;
            border-color: #4f46e5;
        }

        /* ================= CONTENT ================= */
        .content {
            margin-left: 260px;
            padding: 40px;
            background: #d4f4f8;
            min-height: 100vh;
        }

        /* ================= FOOTER ================= */
        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background: linear-gradient(90deg, #111827, #1f2937, #0f766e);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            z-index: 1000;
        }

        
.header-btn{
    padding:8px 16px;

    border-radius:8px;
    border:2px solid #cbd5e1;

    background:white;
    color:#1e293b;

    text-decoration:none;
    font-weight:600;

    transition:all 0.25s ease;
}

.header-btn:hover{
    background:linear-gradient(135deg,#f97316,#f59e0b);
    color:white;
    border-color:#f97316;
}

.container{
    margin-top:100px;
}
/* ================= HEADER ================= */

.header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:70px;

    background:linear-gradient(135deg,#e0f2fe,#f0fdfa);

    border-bottom:3px solid #1e293b;

    box-shadow:0 4px 10px rgba(0,0,0,0.08);

    display:flex;
    justify-content:center;

    z-index:3000;
}

/* header inner container */
.header-container{
    width:100%;
    max-width:1200px;

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:0 20px;
}

.header-left h2{
    font-weight:700;
    color:#1e293b;
}

.header-right{
    display:flex;
    gap:10px;
}
.main-content{
    max-width:1200px;
    margin:auto;
    padding-top:100px;
}

    </style>
</head>

<body>


       <header class="header">

    <div class="header-container">

        <div class="header-left">
            <h2>📈 Analytics</h2>
        </div>

        <div class="header-right">
            <a href="dashboard.html" class="header-btn">🏠 Dashboard</a>
        </div>

    </div>

</header>
<br>
<br>


    <!-- LEFT SIDEBAR -->
    <div class="sidebar">
       
        <br>
        <br>

        <a href="/search-table">
            <button>🔍 Search</button>
        </a>
        <a href="/purchased-table">
            <button>🛒 Purchased</button>
        </a>
<a href="/addtocart-table">
    <button>➕ Add to Cart</button>
</a>    </div>

    <!-- RIGHT CONTENT -->
    <div class="content">
       <!-- ADD THIS -->
    <canvas id="analyticsChart" style="max-width:900px;margin-top:30px;"></canvas>
   </div>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
let chart = null;

async function loadAddToCartGraph() {
    try {
        // ✅ FETCH ADD TO CART DATA
        const res1 = await fetch("/user-addtocart-trend-xml");
        const xmlText = await res1.text();

        const parser = new DOMParser();
        const xml = parser.parseFromString(xmlText, "text/xml");
        const records = Array.from(xml.getElementsByTagName("record"));

        const labels = [];
        const addToCartCounts = [];

        records.forEach(rec => {
            const name = rec.getElementsByTagName("name")[0]?.textContent || "";
            const count = parseInt(rec.getElementsByTagName("count")[0]?.textContent || "0");

            if (count > 0) {
                labels.push(name);
                addToCartCounts.push(count);
            }
        });

        // ✅ FETCH SEARCH DATA (NEW)
        const res2 = await fetch("/products/search-user");
        const searchData = await res2.json();

        const searchCounts = [];

        searchData.forEach(item => {
            searchCounts.push(item.searched_count || 0);
        });

        const ctx = document.getElementById("analyticsChart").getContext("2d");

        if (chart) chart.destroy();

        chart = new Chart(ctx, {
            type: "line",
            data: {
                labels: labels,

                datasets: [

                    // 🔵 EXISTING LINE (Add to Cart)
                    {
                        label: "Add to Cart Trend",
                        data: addToCartCounts,
                        borderColor: "#4f46e5",
                        backgroundColor: "rgba(79,70,229,0.2)",
                        tension: 0.4,
                        fill: true,
                        pointRadius: 5,
                        pointBackgroundColor: "#4f46e5"
                    },

{
    label: "Search Trend",
    data: searchCounts,

    // 🟠 SAME STYLE AS ADD TO CART (SMOOTH CURVE)
    borderColor: "#f97316",
    backgroundColor: "rgba(249,115,22,0.2)",

    tension: 0.4,          // ✅ smooth curve
    fill: true,            // light area fill
    pointRadius: 5,
    pointBackgroundColor: "#f97316"
}
                ]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: {
                        display: true
                    }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        title: { display: true, text: "Count" }
                    },
                    x: {
                        title: { display: true, text: "Product Name" }
                    }
                }
            }
        });

    } catch (err) {
        console.error("Error loading graph:", err);
    }
}

// ACTIVE BUTTON STYLE
const sidebarButtons = document.querySelectorAll(".sidebar button");
sidebarButtons.forEach(btn => {
    btn.addEventListener("click", function () {
        sidebarButtons.forEach(b => b.classList.remove("active"));
        this.classList.add("active");
    });
});

window.onload = function () {
    loadAddToCartGraph();
};

</script>

    <footer class="footer">
        © 2026 Product Dashboard | All Rights Reserved
    </footer>

</body>

</html>
