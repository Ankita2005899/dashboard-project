<!DOCTYPE html>
<html>
<head>
    <title>Product Availabilities</title>
</head>

<body>



<h1>Product Availabilities</h1>
<table border="1" id="availabilities-table">
    <thead>
        <tr>
            <th>ID</th>
            <th>Product ID</th>
            <th>Name</th>
            <th>Category</th>
            <th>Cart Availability</th>
            <th>Dashboard Removed</th>
            <th>Dashboard Availability</th>
            <th>Add from VC</th>
            <th>Sub from VC</th>
            <th>Actual Availability</th>
            <th>Updated At</th>
        </tr>
    </thead>
    <tbody>
        <!-- rows will be added dynamically -->
    </tbody>
</table>

<script>
async function loadAvailabilities() {
    const response = await fetch("/availabilities-xml");
    const xmlText = await response.text();
    const parser = new DOMParser();
    const xml = parser.parseFromString(xmlText, "text/xml");
    const records = xml.getElementsByTagName("record");
    const tbody = document.querySelector("#availabilities-table tbody");
    tbody.innerHTML = "";

    for (let record of records) {
        const row = document.createElement("tr");
        ["id","product_id","name","category","cart_availability",
         "dashboard_item_removed","dashboard_availability",
         "addfrom_vc","subfrom_vc","actual_availability","updated_at"].forEach(tag => {
            const cell = document.createElement("td");
            cell.textContent = record.getElementsByTagName(tag)[0]?.textContent || "";
            row.appendChild(cell);
        });
        tbody.appendChild(row);
    }
}

loadAvailabilities();
</script>
</body>
</html>
